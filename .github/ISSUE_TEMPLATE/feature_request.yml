name: Feature request
description: Suggest an improvement or a new capability for Simple Template.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please describe the problem first, then the solution — it helps us evaluate alternatives.

        Reminder: Simple Template is local-first. Features that require a backend (contact lists, send tracking, hosted CDN) are out of scope for the core app.

  - type: checkboxes
    id: pre-checks
    attributes:
      label: Pre-checks
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
        - label: This request respects the local-first, no-backend scope of the project.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point, not the solution.
      placeholder: "Today I have to ... which is slow/confusing/impossible because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why you discarded them.

  - type: textarea
    id: users
    attributes:
      label: Who benefits?
      description: Is this for a specific audience (designers, marketers, devs)?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would make my workflow much better
        - Blocker — I can't use Simple Template without it
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links, examples from other tools.
